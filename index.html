@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* \u2500\u2500 Light (default) \u2500\u2500 */
:root{
  --bg:#F6F4EF;
  --surface:#FFFFFF;
  --surface2:#F9F7F2;
  --surface3:#F1EEE7;
  --sep:#DDD8CD;
  --border:#E5E1D8;
  --border2:#DDD8CD;
  --overlay:rgba(31,41,55,.4);
  --text:#1F2937;
  --text2:#6B7280;
  --text3:#9CA3AF;
  --accent:#C9A24E;
  --accent-light:#D9B46A;
  --accent-dark:#A8842E;
  --accent-bg:rgba(201,162,78,.08);
  --accent-border:rgba(201,162,78,.22);
  --btn-bg:#C9A24E;
  --btn-text:#FFFFFF;
  --green:#3A7057;
  --green-light:#667452;
  --green-bg:rgba(77,134,107,.09);
  --green-mid:#2D5E47;
  --red:#B385CC;
  --red-bg:rgba(179,133,204,.09);
  --blue:#3E6A8F;
  --blue-bg:rgba(92,127,163,.09);
  --amber:#C9A24E;
  --amber-bg:rgba(201,162,78,.09);
  --purple:#B385CC;
  --purple-bg:rgba(179,133,204,.09);
  --shadow-xs:0 1px 3px rgba(31,41,55,.06),0 1px 2px rgba(31,41,55,.04);
  --shadow-sm:0 2px 8px rgba(31,41,55,.08),0 1px 3px rgba(31,41,55,.05);
  --shadow-md:0 8px 24px rgba(31,41,55,.1),0 2px 8px rgba(31,41,55,.06);
  --shadow-lg:0 20px 48px rgba(31,41,55,.14),0 4px 12px rgba(31,41,55,.08);
  --r-xs:4px;--r-sm:8px;--r-md:11px;--r-lg:14px;--r-xl:18px;
}

/* \u2500\u2500 Dark \u2500\u2500 */
[data-theme="dark"]{
  --bg:#111315;
  --surface:#171A1F;
  --surface2:#1D2127;
  --surface3:#242933;
  --sep:#353B47;
  --border:#2E3440;
  --border2:#353B47;
  --overlay:rgba(0,0,0,.65);
  --text:#F5F5F5;
  --text2:#B0B7C3;
  --text3:#6B7280;
  --accent:#D6A85F;
  --accent-light:#E4BB7A;
  --accent-dark:#B88A40;
  --accent-bg:rgba(214,168,95,.1);
  --accent-border:rgba(214,168,95,.25);
  --btn-bg:#D6A85F;
  --btn-text:#111315;
  --green:#7EC4A4;
  --green-light:#7A9362;
  --green-bg:rgba(79,137,111,.1);
  --green-mid:#5EA88A;
  --red:#B35C5C;
  --red-bg:rgba(179,92,92,.1);
  --blue:#8DC0E8;
  --blue-bg:rgba(109,147,199,.1);
  --amber:#D6A85F;
  --amber-bg:rgba(214,168,95,.1);
  --purple:#C9A0DF;
  --purple-bg:rgba(201,160,223,.12);
  --shadow-xs:0 1px 3px rgba(0,0,0,.35);
  --shadow-sm:0 2px 8px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05);
  --shadow-lg:0 20px 48px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.06);
}
[data-theme="dark"]{color:var(--text);background:var(--bg)}
[data-theme="dark"] .topbar{background:rgba(17,19,21,.96)!important;backdrop-filter:blur(24px)}
[data-theme="dark"] .hm-menu{background:rgba(17,19,21,.98)!important;backdrop-filter:blur(24px)}
[data-theme="dark"] .bottom-nav{background:rgba(17,19,21,.97)!important;backdrop-filter:blur(24px)}
[data-theme="dark"] .modal{background:var(--surface)!important}
[data-theme="dark"] .oz-lbl{color:var(--text2)}
[data-theme="dark"] .kasa-lbl{color:var(--text2)}
[data-theme="dark"] .oz-hd{color:var(--text2)}
[data-theme="dark"] .sec-head{color:var(--text2)}
[data-theme="dark"] .settings-sec-head{color:var(--text2)}
[data-theme="dark"] .sec-total{color:var(--text2)}
[data-theme="dark"] .dd{color:var(--text2)}
[data-theme="dark"] .gt-lbl{color:var(--text2)}
[data-theme="dark"] .sl{color:var(--text2)}
[data-theme="dark"] .tab:not(.active){color:var(--text2)}
[data-theme="dark"] .s-tab:not(.active){color:var(--text2)}
[data-theme="dark"] .hm-item:not(.active){color:var(--text2)}
[data-theme="dark"] .nav-item:not(.active){color:var(--text2)}
[data-theme="dark"] .empty{color:var(--text2)}
[data-theme="dark"] .add-r{color:var(--text3)}
[data-theme="dark"] .add-r:hover{color:var(--accent-light)}
[data-theme="dark"] .date-chip{color:var(--text2)}
[data-theme="dark"] .logout-chip{color:var(--text2)}
[data-theme="dark"] .yetki-banner{color:var(--text2)}

/* \u2500\u2500 tip badges \u2500\u2500 */
.tip-n{background:rgba(58,112,87,.12);color:#3A7057;border:1px solid rgba(58,112,87,.25)}
.tip-h{background:rgba(62,106,143,.12);color:#3E6A8F;border:1px solid rgba(62,106,143,.25)}
.tip-kk{background:rgba(62,106,143,.12);color:#3E6A8F;border:1px solid rgba(62,106,143,.25)}
.tip-m{background:rgba(122,90,168,.12);color:#7A5AA8;border:1px solid rgba(122,90,168,.25)}
.tip-a{background:rgba(138,106,26,.12);color:#8A6A1A;border:1px solid rgba(138,106,26,.25)}
[data-theme="dark"] .tip-n{background:rgba(126,196,164,.15);color:#7EC4A4;border:1px solid rgba(126,196,164,.3)}
[data-theme="dark"] .tip-h{background:rgba(141,192,232,.15);color:#8DC0E8;border:1px solid rgba(141,192,232,.3)}
[data-theme="dark"] .tip-m{background:rgba(180,150,230,.15);color:#B496E6;border:1px solid rgba(180,150,230,.3)}
[data-theme="dark"] .tip-a{background:rgba(232,192,122,.15);color:#E8C07A;border:1px solid rgba(232,192,122,.3)}

/* \u2500\u2500 Base \u2500\u2500 */
html,body{background:var(--bg);color:var(--text)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;overflow-x:hidden;max-width:100vw;-webkit-font-smoothing:antialiased}
input,textarea,select{font-family:inherit;color:var(--text);background:transparent}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield;font-variant-numeric:tabular-nums}
::placeholder{color:var(--text3)}

/* \u2500\u2500 Topbar \u2500\u2500 */
.topbar{background:rgba(246,244,239,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:8px}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--accent)}
.date-chip{font-size:11px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 11px;white-space:nowrap;font-variant-numeric:tabular-nums}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:var(--text3);border-radius:var(--r-sm);transition:background .15s,color .15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface2);color:var(--text2)}
.icon-btn:active{background:var(--surface3)}
.logout-chip{font-size:11px;font-weight:600;padding:6px 11px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;cursor:pointer;color:var(--text3);display:flex;align-items:center;gap:5px;transition:all .15s}
.logout-chip:hover{border-color:var(--border2);color:var(--text2)}
